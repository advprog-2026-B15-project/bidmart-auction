<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>BidMart Auction</title></head>
<body>
<h2>Add New Auction (Dummy)</h2>
<form th:action="@{/auction/add}" method="post">
    <input type="text" name="title" placeholder="Item Name" required>
    <input type="number" name="initialBid" placeholder="Start Price" required>
    <button type="submit">Create</button>
</form>
<h2>Active Auctions</h2>
<table border="1">
    <tr><th>ID</th><th>Title</th><th>Current Bid</th><th>Status</th></tr>
    <tr th:each="a : ${auctions}">
        <td th:text="${a.id}"></td><td th:text="${a.title}"></td>
        <td th:text="${a.currentBid}"></td><td th:text="${a.status}"></td>
    </tr>
</table>
</body>
</html>
