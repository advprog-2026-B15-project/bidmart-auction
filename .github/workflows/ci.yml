name: Java CI with SonarCloud and Dummy CD
on:
  push:
    branches: [ staging, main, feat/ci-cd ]
  pull_request:
    branches: [ staging, main ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build and Run Tests
        run: ./gradlew test
      - name: SonarCloud Scan
        run: ./gradlew sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  dummy-cd:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Dummy Deployment
      run: echo "Deployment guard passed. Deploying to Staging..."