name: Continuous Integration & Dummy CD

on:
  push:
    branches: [ "main", "staging", "feat/ci-cd" ]
  pull_request:
    branches: [ "main", "staging" ]

jobs:
  test:
    name: Unit Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Run Unit Tests
        run: ./gradlew test

  deploy:
    name: Dummy Deployment
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    steps:
      - name: Dummy Deploy Logic
        run: |
          echo "CI Quality Check Passed!"
          echo "Simulating deployment to ${{ github.ref == 'refs/heads/main' && 'Production' || 'Staging' }} environment..."